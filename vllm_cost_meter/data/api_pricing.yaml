# LLM API Pricing Reference — April 2026
# Prices in USD per million tokens.
# Community: update this file and submit a PR when prices change.
#
# Fields:
#   provider:             API provider name
#   model_type:           proprietary | open_source
#   input_per_mtok:       $/M input tokens (standard)
#   output_per_mtok:      $/M output tokens (standard)
#   cached_input_per_mtok: $/M cached/prompt-cached input tokens (if supported)
#   context_window:       max tokens (if known)
#   data_residency:       us | eu | cn | multi (where data is processed)
#   last_verified:        YYYY-MM when price was last checked
#
# Cache pricing notes:
#   OpenAI:    75% off cached reads for GPT-4.1 family, 50% for GPT-4o family
#   Anthropic: 90% off cached reads (cache read = 0.1x base input price)
#   Google:    context caching available, varies by model
#   Together:  50% off cached input tokens
#   Fireworks: 50% off cached input tokens

