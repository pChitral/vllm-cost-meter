# vllm_cost_meter/data/benchmark_curves.yaml
# Saturation throughput reference data from:
# "Beyond Per-Token Pricing: A Concurrency-Aware Methodology
#  for LLM Infrastructure Cost Estimation" (arXiv:2606.11690)
#
# Every curve declares its workload_protocol so consumers can judge applicability.
# theta_max_tok_s is RAW SATURATION (no SLO bound). Goodput curves are v2 work.
#
# Community: add your own hardware/engine curves via PR. Include workload_protocol.

format_version: "2"
reference_paper: "https://arxiv.org/abs/2606.11690"
reference_gpu_hourly_usd: 6.98

# Default workload protocol inherited by all paper-derived curves below.
# Individual curves may override any field.
_paper_protocol_default: &paper_protocol
  input_tokens_mean: 512
  output_tokens_mean: 256
  input_distribution: "random"
  arrival_pattern: "poisson"
  burstiness: 1.0
  prefix_caching: false
  chunked_prefill: false
  sla_bound: null
  source: "paper-methods-§4.3"

curves:
  # -- vLLM engine --------------------------------------------------------
  - id: "vllm/llama-3.1-8b/fp16/1xh100"
    engine: vllm
    model_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
    model_aliases: ["Meta-Llama-3.1-8B-Instruct", "llama-3.1-8b", "llama3.1-8b", "llama-3.1-8b-instruct"]
    quantization: "float16"
    n_gpus: 1
    gpu_type: "h100"
    theta_max_tok_s: 6237.6
    c_naive_per_mtok: 0.3108
    source: "paper-C1"
    workload_protocol: *paper_protocol

  - id: "vllm/llama-3.1-8b/fp8/1xh100"
